# Do not modify!
# This file was generated by https://github.com/JLarky/gha-ts

name: Deploy backend and frontend
on:
  push:
    branches:
      - develop
jobs:
  deployBackAndFront:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}
      - name: Extract Docker metadata for frontend
        id: meta_fe
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/phone-link-org/phone-link/frontend
          tags: |-
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=raw,value=1.0.${{ github.run_number }}
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64, linux/arm64
          tags: ${{ steps.meta_fe.outputs.tags }}
          labels: ${{ steps.meta_fe.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |-
            VITE_NAVER_CLIENT_ID=${{ secrets.VITE_NAVER_CLIENT_ID }}
            VITE_KAKAO_CLIENT_ID=${{ secrets.VITE_KAKAO_CLIENT_ID }}
      - name: Extract Docker metadata for backend
        id: meta_be
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/phone-link-org/phone-link/backend
          tags: |-
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=raw,value=1.0.${{ github.run_number }}
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64, linux/arm64
          tags: ${{ steps.meta_be.outputs.tags }}
          labels: ${{ steps.meta_be.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
