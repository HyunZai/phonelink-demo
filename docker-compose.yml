services:
  mysql:
    image: mysql:8.0.44
    container_name: phonelink-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - phonelink-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: phonelink-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "4000:4000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - phonelink-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_NAVER_CLIENT_ID=${VITE_NAVER_CLIENT_ID}
        - VITE_KAKAO_CLIENT_ID=${VITE_KAKAO_CLIENT_ID}
        - VITE_NAVER_REDIRECT_URI=${VITE_NAVER_REDIRECT_URI}
        - VITE_KAKAO_REDIRECT_URI=${VITE_KAKAO_REDIRECT_URI}
    container_name: phonelink-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - phonelink-network

volumes:
  mysql-data: # DB 데이터 영구 저장 볼륨

networks:
  phonelink-network: # 컨테이너들이 공유하는 내부 네트워크
